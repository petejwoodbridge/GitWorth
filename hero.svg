<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1080" width="720" height="1080" font-family="'Courier New', Courier, monospace">
  <defs>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#2a2622"/>
      <rect y="2" width="4" height="2" fill="#221d1a"/>
    </pattern>
    <radialGradient id="shine" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="paperHatch" width="60" height="60" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="60" height="60" fill="#f5efe1"/>
      <rect width="30" height="60" fill="#8b744e" opacity="0.04"/>
    </pattern>
    <filter id="paperShadow" x="-10%" y="-5%" width="120%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Workbench background with horizontal scanlines -->
  <rect width="720" height="1080" fill="url(#scan)"/>

  <!-- Paper receipt with scalloped (perforated) top & bottom edges -->
  <g filter="url(#paperShadow)">
    <path fill="url(#paperHatch)" d="
      M 80 60
      a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0
      a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0
      a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0
      a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0
      a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0
      a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0
      a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0
      a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0
      a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0
      a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0
      a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0
      a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0
      a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0
      a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0 a 5 5 0 0 1 10 0
      L 640 1020
      a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0
      a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0
      a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0
      a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0
      a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0
      a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0
      a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0
      a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0
      a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0
      a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0
      a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0
      a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0
      a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0
      a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0
      a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0 a 5 5 0 0 1 -10 0
      Z
    "/>
    <!-- top shine highlight -->
    <rect x="80" y="60" width="560" height="200" fill="url(#shine)"/>
  </g>

  <!-- ======================== HEADER ======================== -->
  <g text-anchor="middle" fill="#1a1612">
    <text x="360" y="120" font-size="36" font-weight="700" letter-spacing="6">GITWORTH</text>
    <text x="360" y="146" font-size="11" fill="#4a3f2f" letter-spacing="4">CERTIFIED REPOSITORY VALUATION</text>
    <text x="360" y="166" font-size="9" fill="#7a6b53" letter-spacing="2">EST. 2026  ·  LICENSE #GW-447291</text>
  </g>

  <!-- dashed rule -->
  <line x1="112" y1="190" x2="608" y2="190" stroke="#2a221a" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- repo name + date -->
  <g text-anchor="middle" fill="#1a1612">
    <text x="360" y="225" font-size="22" font-weight="700" letter-spacing="3">USERNAME / GITWORTH</text>
    <text x="360" y="248" font-size="10" fill="#4a3f2f" letter-spacing="2">28 APR 2026  ·  REF #X4K9P2</text>
  </g>

  <!-- ======================== PROPERTY PARTICULARS ======================== -->
  <g fill="#4a3f2f">
    <text x="112" y="290" font-size="11" letter-spacing="3" font-weight="700">PROPERTY PARTICULARS</text>
    <line x1="112" y1="298" x2="608" y2="298" stroke="#7a6b53" stroke-width="1" stroke-dasharray="2 3"/>
  </g>
  <!-- 4x2 grid -->
  <g font-size="12" fill="#1a1612">
    <!-- row 1 -->
    <text x="112" y="325" font-size="9" fill="#4a3f2f" letter-spacing="1">STARS</text>
    <text x="350" y="325" text-anchor="end" font-weight="700">12</text>
    <line x1="112" y1="332" x2="350" y2="332" stroke="#7a6b53" stroke-dasharray="1 3"/>

    <text x="370" y="325" font-size="9" fill="#4a3f2f" letter-spacing="1">FORKS</text>
    <text x="608" y="325" text-anchor="end" font-weight="700">2</text>
    <line x1="370" y1="332" x2="608" y2="332" stroke="#7a6b53" stroke-dasharray="1 3"/>

    <!-- row 2 -->
    <text x="112" y="358" font-size="9" fill="#4a3f2f" letter-spacing="1">WATCHERS</text>
    <text x="350" y="358" text-anchor="end" font-weight="700">3</text>
    <line x1="112" y1="365" x2="350" y2="365" stroke="#7a6b53" stroke-dasharray="1 3"/>

    <text x="370" y="358" font-size="9" fill="#4a3f2f" letter-spacing="1">OPEN ISSUES</text>
    <text x="608" y="358" text-anchor="end" font-weight="700">1</text>
    <line x1="370" y1="365" x2="608" y2="365" stroke="#7a6b53" stroke-dasharray="1 3"/>

    <!-- row 3 -->
    <text x="112" y="391" font-size="9" fill="#4a3f2f" letter-spacing="1">AGE</text>
    <text x="350" y="391" text-anchor="end" font-weight="700">0.0y</text>
    <line x1="112" y1="398" x2="350" y2="398" stroke="#7a6b53" stroke-dasharray="1 3"/>

    <text x="370" y="391" font-size="9" fill="#4a3f2f" letter-spacing="1">LAST COMMIT</text>
    <text x="608" y="391" text-anchor="end" font-weight="700">2d ago</text>
    <line x1="370" y1="398" x2="608" y2="398" stroke="#7a6b53" stroke-dasharray="1 3"/>

    <!-- row 4 -->
    <text x="112" y="424" font-size="9" fill="#4a3f2f" letter-spacing="1">LANGUAGE</text>
    <text x="350" y="424" text-anchor="end" font-weight="700">HTML</text>
    <line x1="112" y1="431" x2="350" y2="431" stroke="#7a6b53" stroke-dasharray="1 3"/>

    <text x="370" y="424" font-size="9" fill="#4a3f2f" letter-spacing="1">LICENSE</text>
    <text x="608" y="424" text-anchor="end" font-weight="700">MIT</text>
    <line x1="370" y1="431" x2="608" y2="431" stroke="#7a6b53" stroke-dasharray="1 3"/>
  </g>

  <!-- ======================== ITEMISED VALUATION ======================== -->
  <g fill="#4a3f2f">
    <text x="112" y="475" font-size="11" letter-spacing="3" font-weight="700">ITEMISED VALUATION</text>
    <line x1="112" y1="483" x2="608" y2="483" stroke="#7a6b53" stroke-width="1" stroke-dasharray="2 3"/>
  </g>

  <g font-size="13" fill="#1a1612">
    <!-- item 1 -->
    <text x="112" y="510">Single-file static webapp</text>
    <text x="608" y="510" text-anchor="end" font-weight="700">$180</text>
    <line x1="290" y1="513" x2="555" y2="513" stroke="#7a6b53" stroke-dasharray="1 4"/>

    <!-- item 2 -->
    <text x="112" y="535">Receipt-printer aesthetic, fully committed</text>
    <text x="608" y="535" text-anchor="end" font-weight="700">$240</text>
    <line x1="395" y1="538" x2="555" y2="538" stroke="#7a6b53" stroke-dasharray="1 4"/>

    <!-- item 3 -->
    <text x="112" y="560">Tongue-in-cheek conceit, well-executed</text>
    <text x="608" y="560" text-anchor="end" font-weight="700">$95</text>
    <line x1="370" y1="563" x2="565" y2="563" stroke="#7a6b53" stroke-dasharray="1 4"/>

    <!-- item 4 -->
    <text x="112" y="585">12 GitHub stars (early days)</text>
    <text x="608" y="585" text-anchor="end" font-weight="700">$60</text>
    <line x1="305" y1="588" x2="565" y2="588" stroke="#7a6b53" stroke-dasharray="1 4"/>

    <!-- item 5 (deduction) -->
    <text x="112" y="610">No contributors beyond original author</text>
    <text x="608" y="610" text-anchor="end" font-weight="700" fill="#8b1a1a">-$40</text>
    <line x1="385" y1="613" x2="555" y2="613" stroke="#7a6b53" stroke-dasharray="1 4"/>
  </g>

  <!-- subtotal row -->
  <line x1="112" y1="640" x2="608" y2="640" stroke="#2a221a" stroke-width="2" stroke-dasharray="6 5"/>
  <g fill="#1a1612" font-size="14" font-weight="700">
    <text x="112" y="665" letter-spacing="2">SUBTOTAL</text>
    <text x="608" y="665" text-anchor="end">$535</text>
  </g>
  <line x1="112" y1="678" x2="608" y2="678" stroke="#2a221a" stroke-width="3"/>
  <line x1="112" y1="683" x2="608" y2="683" stroke="#2a221a" stroke-width="1"/>

  <!-- ======================== FINAL VALUE ======================== -->
  <g fill="#4a3f2f">
    <text x="112" y="720" font-size="11" letter-spacing="3" font-weight="700">FINAL APPRAISED VALUE</text>
    <line x1="112" y1="728" x2="608" y2="728" stroke="#7a6b53" stroke-width="1" stroke-dasharray="2 3"/>
  </g>
  <text x="360" y="775" text-anchor="middle" font-size="44" font-weight="700" fill="#1a1612" letter-spacing="3">$475</text>

  <!-- ======================== APPRAISER'S NOTES ======================== -->
  <g fill="#4a3f2f">
    <text x="112" y="820" font-size="11" letter-spacing="3" font-weight="700">APPRAISER'S NOTES</text>
    <line x1="112" y1="828" x2="608" y2="828" stroke="#7a6b53" stroke-width="1" stroke-dasharray="2 3"/>
  </g>
  <rect x="112" y="838" width="496" height="92" fill="#8b744e" opacity="0.06"/>
  <line x1="112" y1="838" x2="112" y2="930" stroke="#4a3f2f" stroke-width="3"/>
  <g fill="#4a3f2f" font-style="italic" font-size="12">
    <text x="128" y="862">"A handsome conceit executed with admirable restraint. The receipt</text>
    <text x="128" y="881">aesthetic is committed to without ever becoming twee. Marked down</text>
    <text x="128" y="900">for the sparse contributor base — but that is the nature of fresh</text>
    <text x="128" y="919">listings, and the bones here are quite good."</text>
  </g>

  <!-- barcode -->
  <text x="360" y="965" text-anchor="middle" font-size="22" fill="#1a1612" letter-spacing="-1">|||| | || |||| ||| | || |||| | || ||</text>
  <g fill="#7a6b53" font-size="9" text-anchor="middle" letter-spacing="2">
    <text x="360" y="985">THANK YOU FOR CHOOSING GITWORTH</text>
    <text x="360" y="1000">A WHOLLY SPECULATIVE SUBSIDIARY OF NOWHERE</text>
  </g>

  <!-- ======================== APPRAISED STAMP ======================== -->
  <g transform="rotate(-9, 540, 240)" opacity="0.85">
    <rect x="465" y="208" width="150" height="64" fill="rgba(245,239,225,0.65)" stroke="#8b1a1a" stroke-width="3"/>
    <text x="540" y="232" text-anchor="middle" font-size="16" font-weight="700" fill="#8b1a1a" letter-spacing="3">APPRAISED</text>
    <text x="540" y="252" text-anchor="middle" font-size="9" fill="#8b1a1a" letter-spacing="2">28 APR 2026</text>
    <text x="540" y="265" text-anchor="middle" font-size="8" fill="#8b1a1a" letter-spacing="1">CERT. APPRAISER #4471</text>
  </g>
</svg>
